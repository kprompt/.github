name: Bug report
description: Something is broken in the CLI, install script, or website install flow
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For security issues, use [private vulnerability reporting](https://github.com/kprompt/kprompt/security/advisories/new) instead.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI (kprompt)
        - Install script
        - Website
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: kprompt version
      description: Output of `kprompt version` (if applicable)
      placeholder: "0.2.0"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear and concise description
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Prompt, flags, provider, and cluster context if relevant
      placeholder: |
        1. export KPROMPT_...
        2. kprompt "..."
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / errors
      description: Redact API keys and sensitive cluster data
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I redacted secrets from logs and config snippets
          required: true
